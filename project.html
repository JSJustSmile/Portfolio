    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const notFound = document.getElementById("notFound");
    const projectWrap = document.getElementById("projectWrap");

    if (!id || !data[id]) {
      notFound.classList.remove("hidden");
      throw new Error("Invalid project ID");
    }

    const project = data[id];

    document.title = project.title;
    document.getElementById("title").innerText = project.title;
    document.getElementById("meta").innerText = project.meta;
    document.getElementById("desc").innerText = project.desc;

    const tagsWrap = document.getElementById("tags");
    project.tags.forEach(tag => {
      const span = document.createElement("span");
      span.className = "px-3 py-1 bg-gray-200 rounded-full text-sm";
      span.innerText = tag;
      tagsWrap.appendChild(span);
    });

    const mainContainer = document.getElementById("mainImage").parentElement;
    mainContainer.innerHTML = ""; // ล้างของเดิม

    function renderMain(media) {
    mainContainer.innerHTML = "";

    if (media.type === "image") {
        const img = document.createElement("img");
        img.src = media.src;
        img.className = "rounded-xl w-full h-[500px] object-contain shadow cursor-zoom-in hover:scale-[1.02] transition";
        img.onclick = () => openModal(media.src);
        mainContainer.appendChild(img);
    }

    if (media.type === "video") {
        const video = document.createElement("video");
        video.src = media.src;
        video.controls = true;
        video.className = "rounded-xl w-full h-[500px] object-contain shadow";
        mainContainer.appendChild(video);
    }
    }

    const thumbs = document.getElementById("thumbs");

    project.media.forEach((item, index) => {
    const el = document.createElement(item.type === "image" ? "img" : "video");

    el.src = item.src;
    el.className = "w-full h-24 object-cover rounded-lg cursor-pointer border hover:border-orange-500";

    if (item.type === "video") {
        el.muted = true;
    }

    el.onclick = () => {
        renderMain(item);

        document.querySelectorAll("#thumbs *").forEach(t =>
        t.classList.remove("ring-2", "ring-orange-500")
        );
        el.classList.add("ring-2", "ring-orange-500");
    };

    thumbs.appendChild(el);

    if (index === 0) renderMain(item);
    });

    projectWrap.classList.remove("hidden");

    function openModal(src) {
      const modal = document.getElementById("imageModal");
      const modalImg = document.getElementById("modalImage");
      modalImg.src = src;
      modal.classList.remove("opacity-0", "pointer-events-none");
    }

    function closeModal() {
      const modal = document.getElementById("imageModal");
      modal.classList.add("opacity-0", "pointer-events-none");
    }

    window.closeModal = closeModal;

    document.getElementById("imageModal").addEventListener("click", function(e) {
      if (e.target.id === "imageModal") closeModal();
    });
